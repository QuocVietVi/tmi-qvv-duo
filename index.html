<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | TmiQvv</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
        width: 100%;
        height: 100%;
      }

      /* Container full màn hình thật */
      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh; /* chuẩn mới */
        height: calc(var(--vh, 1vh) * 100); /* fallback máy cũ */
        touch-action: none;
      }

      /* Canvas full màn hình */
      #unity-canvas {
        width: 100vw;
        height: 100dvh;
        height: calc(var(--vh, 1vh) * 100);
        display: block;
        background: black;
      }

      /* Nếu thiết bị đang cầm dọc → xoay ngang */
      @media screen and (orientation: portrait) {
        #unity-canvas {
          transform: rotate(90deg);
          transform-origin: center center;
          width: 100vh;
          height: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas"></canvas>
    <script src="Build/TrmyBuildWeb.loader.js"></script>
    <script>
      /* ===== Fix chiều cao thật khi trình duyệt có thanh trên/dưới ===== */
      function setRealHeight() {
        document.documentElement.style.setProperty(
          "--vh",
          window.innerHeight * 0.01 + "px",
        );
      }
      window.addEventListener("resize", setRealHeight);
      setRealHeight();

      /* ===== Tạo Unity instance ===== */
      const canvas = document.querySelector("#unity-canvas");

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/TrmyBuildWeb.data",
        frameworkUrl: "Build/TrmyBuildWeb.framework.js",
        codeUrl: "Build/TrmyBuildWeb.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TmiQvv",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
</html>
